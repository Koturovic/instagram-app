# Pokreće unit testove na svaki kreirani/izmenjeni pull request
name: CI - Pull Request

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (backend + frontend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test

      - name: Run frontend unit tests with coverage
        working-directory: frontend
        run: npx vitest --run --coverage --exclude "e2e/**"

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend E2E tests
        working-directory: frontend
        run: npm run test:e2e

      # DAJE dozvolu za auth-service mvnw
      - name: Make auth-service mvnw executable
        run: chmod +x services/auth-service/mvnw

      - name: Run auth-service tests
        working-directory: services/auth-service
        run: ./mvnw test -B

      - name: Make root mvnw executable
        run: chmod +x mvnw

      - name: Run user-service tests
        working-directory: .
        run: ./mvnw test -B

      - name: Make post-service mvnw executable
        run: chmod +x post-service/mvnw

      - name: Run post-service tests
        working-directory: post-service
        run: ./mvnw test -B

      - name: Make interaction-service mvnw executable
        run: chmod +x interaction-service/mvnw

      - name: Run interaction-service tests
        working-directory: interaction-service
        run: ./mvnw test -B

      - name: Make feed-service mvnw executable
        run: chmod +x feed-service/mvnw

      - name: Run feed-service tests
        working-directory: feed-service
        run: ./mvnw test -B

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-pr
          path: frontend/coverage
          if-no-files-found: warn

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-report-pr
          path: frontend/playwright-report
          if-no-files-found: warn
