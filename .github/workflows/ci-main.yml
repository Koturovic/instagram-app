# Pokreće testove i push-uje Docker image na Docker Hub pri push-u na main
# Verzija image-a: yyyymmdd-hhmmss (npr. 20251227-143022)
name: CI - Main (Build & Push)

on:
  push:
    branches: [main]

jobs:
  test-and-push:
    name: Test, Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Pokreni unit testove
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # DAJE dozvolu za auth-service mvnw
      - name: Make auth-service mvnw executable
        run: chmod +x services/auth-service/mvnw

      - name: Run auth-service tests
        working-directory: services/auth-service
        run: ./mvnw test -B

      - name: Make root mvnw executable
        run: chmod +x mvnw

      - name: Run user-service tests
        working-directory: .
        run: ./mvnw test -B

      - name: Make post-service mvnw executable
        run: chmod +x post-service/mvnw

      - name: Run post-service tests
        working-directory: post-service
        run: ./mvnw test -B

      - name: Make interaction-service mvnw executable
        run: chmod +x interaction-service/mvnw

      - name: Run interaction-service tests
        working-directory: interaction-service
        run: ./mvnw test -B

      - name: Make feed-service mvnw executable
        run: chmod +x feed-service/mvnw

      - name: Run feed-service tests
        working-directory: feed-service
        run: ./mvnw test -B

      # 2. Verzija u formatu yyyymmdd-hhmmss
      - name: Generate image tag
        id: tag
        run: echo "value=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      # 3. Login na Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build i push auth-service image
      - name: Build and push auth-service
        uses: docker/build-push-action@v6
        with:
          context: ./services/auth-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/auth-service:${{ steps.tag.outputs.value }}
            ${{ secrets.DOCKER_USERNAME }}/auth-service:latest

      # 5. Build i push user-service image
      - name: Build and push user-service
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/user-service:${{ steps.tag.outputs.value }}
            ${{ secrets.DOCKER_USERNAME }}/user-service:latest

      # 6. Build i push post-service image
      - name: Build and push post-service
        uses: docker/build-push-action@v6
        with:
          context: ./post-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/post-service:${{ steps.tag.outputs.value }}
            ${{ secrets.DOCKER_USERNAME }}/post-service:latest

      # 7. Build i push interaction-service image
      - name: Build and push interaction-service
        uses: docker/build-push-action@v6
        with:
          context: ./interaction-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/interaction-service:${{ steps.tag.outputs.value }}
            ${{ secrets.DOCKER_USERNAME }}/interaction-service:latest

      # 8. Build i push feed-service image
      - name: Build and push feed-service
        uses: docker/build-push-action@v6
        with:
          context: ./feed-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/feed-service:${{ steps.tag.outputs.value }}
            ${{ secrets.DOCKER_USERNAME }}/feed-service:latest
