# Aplikacija
spring.application.name=user-service
server.port=8081

# PostgreSQL (Docker: localhost:5433, baza auth_db)
spring.datasource.url=jdbc:postgresql://localhost:5432/user_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT (samo za /dev/test-token – lokalno testiranje)
app.jwt.secret=${JWT_SECRET:default-secret-change-in-production-min-256-bits-for-hs256}

# Auth service – validacija tokena (ne parsujemo JWT u user-service, zovemo validate)
# Lokalno: http://localhost:8080
# Docker: http://auth-service:8080
app.auth.service-url=${AUTH_SERVICE_URL:http://localhost:8080}

# Uključi samo za ručno testiranje u Postmanu (generiše test JWT na POST /dev/test-token)
app.dev.test-token-enabled=true

# Actuator – health za Postman/Docker proveru
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized